name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            bundle: 'msi,nsis'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            bundle: 'dmg,app'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundle: 'dmg,app'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            bundle: 'deb,appimage,rpm'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux build dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Extract version
        id: version
        run: echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Second Brain v${{ steps.version.outputs.VERSION }}'
          releaseBody: |
            Download the latest release of Second Brain.
            
            ## Installation
            - **Windows**: Download the MSI or NSIS installer
            - **macOS**: Download the DMG or drag the app to Applications
            - **Linux**: Download the DEB, AppImage, or RPM package
            
            ## Available Installers
            | Platform | Type | Architecture |
            |----------|------|--------------|
            | Windows | MSI, NSIS | x64 |
            | macOS | DMG | x64, Apple Silicon (ARM64) |
            | Linux | DEB, AppImage, RPM | x64 |
          releaseDraft: false
          prerelease: false
          args: '--target ${{ matrix.target }} --bundles ${{ matrix.bundle }}'

  # Release is created automatically by tauri-action for each tag
  # All platform artifacts are uploaded as release assets
