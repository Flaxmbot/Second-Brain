name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # Build Windows — creates the release
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            bundle: 'msi,nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Internet Memory v${{ steps.version.outputs.VERSION }}'
          body: |
            Download the latest release of Internet Memory.
            
            ## Installation
            - **Windows**: Download the MSI or NSIS installer
            - **macOS**: Download the DMG
            - **Linux**: Download the DEB, AppImage, or RPM package
            
            ## Available Installers
            | Platform | Type | Architecture |
            |----------|------|--------------|
            | Windows | MSI, NSIS | x64 |
            | macOS | DMG | x64, Apple Silicon (ARM64) |
            | Linux | DEB, AppImage, RPM | x64 |
          draft: false
          prerelease: false
          files: src-tauri/target/${{ matrix.target }}/release/bundle/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build macOS
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            bundle: 'dmg'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundle: 'dmg'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**/*

  # Build Linux
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            bundle: 'deb,appimage,rpm'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**/*

  # Add macOS and Linux artifacts to the release created by Windows job
  add-assets-to-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts (x64)
        uses: actions/download-artifact@v4
        with:
          name: macos-bundles-x86_64-apple-darwin
          path: macos-bundle/x64

      - name: Download macOS artifacts (ARM64)
        uses: actions/download-artifact@v4
        with:
          name: macos-bundles-aarch64-apple-darwin
          path: macos-bundle/arm64

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: linux-bundle

      - name: List downloaded files
        run: |
          echo "=== macOS x64 ==="
          find macos-bundle/x64/ -type f || true
          echo "=== macOS ARM64 ==="
          find macos-bundle/arm64/ -type f || true
          echo "=== Linux ==="
          find linux-bundle/ -type f || true

      - name: Upload macOS x64 artifacts to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
            if (!release) { console.log('No release found'); return; }
            
            const walkDir = (dir) => {
              let files = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) files.push(...walkDir(fullPath));
                else files.push(fullPath);
              }
              return files;
            };
            
            for (const filePath of walkDir('macos-bundle/x64')) {
              console.log(`Uploading: ${filePath}`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: `macos-x64-${path.basename(filePath)}`,
                data: fs.readFileSync(filePath),
              });
            }

      - name: Upload macOS ARM64 artifacts to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
            if (!release) { console.log('No release found'); return; }
            
            const walkDir = (dir) => {
              let files = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) files.push(...walkDir(fullPath));
                else files.push(fullPath);
              }
              return files;
            };
            
            for (const filePath of walkDir('macos-bundle/arm64')) {
              console.log(`Uploading: ${filePath}`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: `macos-arm64-${path.basename(filePath)}`,
                data: fs.readFileSync(filePath),
              });
            }

      - name: Upload Linux artifacts to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
            if (!release) { console.log('No release found'); return; }
            
            const walkDir = (dir) => {
              let files = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) files.push(...walkDir(fullPath));
                else files.push(fullPath);
              }
              return files;
            };
            
            for (const filePath of walkDir('linux-bundle')) {
              console.log(`Uploading: ${filePath}`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: `linux-${path.basename(filePath)}`,
                data: fs.readFileSync(filePath),
              });
            }
